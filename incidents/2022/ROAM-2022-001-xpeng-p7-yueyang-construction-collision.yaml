description: |
  An XPeng P7 owner in Yueyang, Hunan province drove for more than
  ten kilometers on a national highway with Advanced Driver
  Assistance System (ADAS, XPILOT at the time) engaged, when the
  vehicle encountered an overturned vehicle in its travel lane and
  collided with it at speed without braking. The driver survived
  but the P7 was heavily damaged. XPeng officially responded that
  the cause was the driver's failure to maintain attention on the
  road ahead and take over the vehicle in time.
description_cn: |
  一名湖南岳阳的小鹏 P7 车主在国道上开启辅助驾驶（彼时称 XPILOT）
  行驶了十几公里，前方突遇一辆侧翻的事故车辆，P7 未减速直接撞了
  上去。车主幸存但车辆严重损毁。小鹏汽车官方回应称，事故主因是
  车主未对前方环境保持观察并及时接管车辆。
