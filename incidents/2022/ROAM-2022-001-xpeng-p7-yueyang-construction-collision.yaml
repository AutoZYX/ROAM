  resolution_method_cn: "民事赔偿处理；小鹏方面指明车主未及时接管"
root_cause:
  category: "L2 driver-inattention + stationary obstacle not detected"
  category_cn: "L2 驾驶员未接管 + 静止障碍物未识别"
  description: "XPILOT system at the time had known limitations in identifying stationary irregular objects (overturned vehicle) on the road. The L2 paradigm places driver as always-ready supervisor, but the driver relied on system and did not take over when the static obstacle appeared."
  description_cn: "当时 XPILOT 系统对车道内静止的非常规物体（侧翻车辆）识别存在已知局限。L2 范式要求驾驶员时刻准备接管，但该车主过度依赖系统，未在静止障碍物出现时接管车辆。"
  confirmed: true
systemic_issues:
  - "L2+ stationary obstacle detection was widely unreliable in Chinese market in 2022"
  - "Over-trust in L2 systems by Chinese consumers following aggressive OEM marketing"
  - "Highway/national-road ODD for L2 was poorly defined"
  - "Takeover-request latency and attention monitoring were insufficient"
systemic_issues_cn:
  - "2022 年中国市场 L2+ 静止障碍物识别普遍不可靠"
  - "中国消费者在 OEM 激进营销下对 L2 系统过度信任"
  - "高速/国道 L2 ODD 定义不清晰"
  - "接管请求延迟和注意力监测不足"
regulatory_action: |
  No specific regulatory sanction. Part of broader 2022 incidents
  that later informed MIIT's intelligent-connected-vehicle safety
  management requirements.
regulatory_action_cn: |
  未有专项监管处罚。属于 2022 年一系列同类事件，后续推动了工信部
  《智能网联汽车产品准入和安全管理》相关要求的出台。
