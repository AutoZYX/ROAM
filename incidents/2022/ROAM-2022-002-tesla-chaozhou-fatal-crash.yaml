  resolution_method: "criminal investigation; judicial appraisal confirmed no mechanical failure"
  resolution_method_cn: "刑事调查；司法鉴定排除机械故障"
root_cause:
  category: "disputed — driver error vs system anomaly (judicially ruled driver error)"
  category_cn: "存在争议——司法鉴定认定为驾驶员操作失误"
  description: "Judicial appraisal concluded the brake and steering systems were functioning normally. Tesla attributed the incident to driver operation. The driver maintained hardware malfunction. No black-box data showing Autopilot engagement; ADS was not active at time of incident. The case left unresolved public suspicion about sudden acceleration claims."
  description_cn: "司法鉴定认定制动与转向系统正常。特斯拉将事件归因于驾驶员操作。车主坚持硬件故障说法。黑匣子数据显示 Autopilot 未启动；事故时 ADS 不处于激活状态。该案在公众层面对'突然加速'的争议并未完全消解。"
  confirmed: true
systemic_issues:
  - "Data sovereignty concerns: vehicle telemetry controlled by OEM, limiting independent verification"
  - "Black-box / Event Data Recorder standards insufficient at that time in China"
  - "Disputed cases between OEM and owner became common pattern without neutral arbitration"
  - "Precursor to MIIT's 2021 mandate requiring Chinese automakers to store driving data domestically"
systemic_issues_cn:
  - "数据主权问题：车辆遥测数据由 OEM 掌控，独立验证困难"
  - "事故数据记录仪（EDR）标准在当时的中国不足"
  - "OEM 与车主的争议案件成为常态，缺乏中立仲裁机制"
  - "推动了工信部 2021 年要求中国车企国内存储行驶数据的政策"
regulatory_action: |
  Case led to broader policy attention on data sovereignty and
  EDR standards in China. Tesla was required to establish China
  data centers for vehicle data storage. GB 39732-2020 (EDR) was
  enforced more strictly in subsequent inspections.
regulatory_action_cn: |
  该案推动了中国对数据主权和 EDR 标准的政策关注。特斯拉被要求在
  中国境内建立数据中心存储车辆数据。GB 39732-2020《汽车事件数据
  记录系统》在后续执法中更严格执行。
