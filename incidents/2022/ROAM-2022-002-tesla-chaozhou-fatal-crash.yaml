description: |
  A Tesla Model Y driver in Raoping County, Chaozhou, Guangdong
  lost control of the vehicle which accelerated uncontrollably
  through city streets for approximately 2.6 kilometers before
  crashing, resulting in 2 deaths and 3 injuries. The driver,
  with over 20 years of driving experience, claimed he stepped
  hard on the brakes but the vehicle would not slow down. A
  subsequent judicial appraisal ruled out brake or steering
  system failure. Tesla won a defamation case against social
  media accounts that had spread unverified claims about the
  accident. The case became emblematic of the "unintended
  acceleration" controversy that surrounded Tesla in China.
description_cn: |
  广东潮州饶平县一辆特斯拉 Model Y 车主操控车辆时，车辆在城市
  道路上疑似失控加速行驶约 2.6 公里后发生碰撞，事故造成 2 人死亡、
  3 人受伤。该车主驾龄 20 多年，声称用力踩下刹车但车辆无法减速。
  后续司法鉴定排除制动和转向系统故障。特斯拉随后在针对散布未经
  证实指控的社交媒体账号的名誉权案件中胜诉。该案成为当时笼罩在
  特斯拉中国头上"意外加速"争议的标志性事件。
impact:
  vehicles_affected: 1
