description: |
  A Waymo autonomous vehicle collided with a wooden utility pole while navigating
  a narrow alley at low speed. No injuries were reported. The incident was caused
  by a software issue in the vehicle's perception and path planning system that
  failed to properly account for the pole's position in the constrained alley
  environment. Waymo issued a voluntary recall of 672 vehicles to address the
  software defect via an OTA update.
