description: |
  A Baidu Apollo Go (萝卜快跑) driverless robotaxi made light contact
  with a pedestrian at the intersection of Parrot Avenue and Guobo
  Avenue in Hanyang District, Wuhan. Baidu stated the incident
  occurred as the vehicle was starting up on a green light when
  the pedestrian crossed against the red light. The pedestrian was
  taken to hospital for examination. The event triggered
  substantial public attention to Robotaxi safety in Chinese cities,
  particularly given the concurrent widespread protests by Wuhan
  taxi drivers complaining about Robotaxi competition (reportedly
  30,000 signatures).
description_cn: |
  一辆百度"萝卜快跑"无人驾驶出租车在武汉汉阳区鹦鹉大道与国博大道
  交会路口与一名行人发生轻微接触。百度官方回应称事故发生于绿灯启动
  之际，行人闯红灯横穿马路。行人被送医检查。该事件引发中国社会对
  城市 Robotaxi 安全的关注，正值彼时武汉约 3 万名出租车司机集体
  抗议 Robotaxi 冲击传统网约车生计的舆论热潮。
impact:
  vehicles_affected: 1
  duration_minutes: null
  traffic_disruption: "minor"
  injuries: 1
  fatalities: 0
emergency_response:
  sos_button: "not_applicable"
  customer_service: "responsive"
  remote_intervention: "post-incident"
  on_site_response: "police, ambulance, Baidu on-site team"
  resolution_method: "medical follow-up; police-supervised on-scene resolution"
  resolution_method_cn: "送医复查；警方监督下现场处置"
root_cause:
  category: "pedestrian jaywalking against signal + perception detected too late"
  category_cn: "行人闯红灯 + 感知识别过晚"
  description: "Baidu attributed cause to the pedestrian crossing against the signal. Nevertheless, from a safety system perspective, the vehicle's perception and response did not avoid contact despite the vehicle being at near-zero speed at green-light launch."
  description_cn: "百度将事故归因于行人闯红灯。但从安全系统视角，尽管车辆处于绿灯启动的极低速状态，感知与响应仍未避免接触。"
  confirmed: true
systemic_issues:
  - "Urban intersection + vulnerable road users (VRU) remain a stress test for L4 perception"
  - "Chinese traffic culture (jaywalking) is a known challenge for rules-based planners"
  - "Public debate reframed the event in terms of job displacement rather than safety engineering"
  - "Highlights the need for bilingual (CN/EN) incident classification: this is B4 (abnormal human behavior) + C5 (low-speed pedestrian contact)"
systemic_issues_cn:
  - "城市交叉口 + 弱势道路使用者（VRU）仍是 L4 感知的压力测试场景"
  - "中国交通文化中的闯红灯对基于规则的规划器是已知挑战"
  - "公共讨论把事件重构为就业冲击议题，而非安全工程议题"
  - "突显了双语事件分类的必要性：此事件同属 B4（异常人类行为）+ C5（低速行人碰撞）"
regulatory_action: |
  Wuhan municipal traffic authorities investigated the incident.
  No formal regulatory sanctions against Baidu. The event indirectly
  contributed to broader Chinese national discussion on Robotaxi
  operation safety and the subsequent MIIT-led drafting of GB/T
  "Safety Events Data Interaction and Management System Technical
  Specification" that began formal meetings in April 2026.
regulatory_action_cn: |
  武汉市交管部门介入调查。未对百度采取正式监管处罚。事件间接推动
  了中国对 Robotaxi 运营安全的全国性讨论，并为 2026 年 4 月工信部
  主导的《智能网联汽车 安全事件数据交互与管理系统技术规范》国标
  项目组正式会议提供了舆论背景。
