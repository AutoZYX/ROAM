root_cause:
  category: "vehicle fire / mechanical failure"
  description: "Vehicle veered off road and caught fire; root cause under investigation. Potential causes include electrical system failure, battery thermal event, or mechanical failure leading to loss of control"
  confirmed: false
systemic_issues:
  - "Vehicle fire represents a severe failure mode for public trust"
  - "Loss of vehicle control preceding fire suggests possible cascading failure"
  - "Remote monitoring was unable to prevent or mitigate the incident"
  - "Autonomous test vehicles operating without safety drivers face unique fire response challenges"
regulatory_action: |
  Beijing Daxing district temporarily suspended Pony.ai's robotaxi service
  pending investigation. Service gradually resumed after review.
