root_cause:
  category: "pedestrian detection / child behavior prediction"
  description: "Vehicle failed to adequately predict and respond to the movement of a child in a school zone environment; children exhibit less predictable trajectories than adult pedestrians"
  confirmed: false
systemic_issues:
  - "School zones represent a high-risk ODD that may require special operating restrictions"
  - "Child pedestrian behavior is significantly less predictable than adult behavior"
  - "Morning drop-off creates chaotic, dense pedestrian environments"
  - "Public sensitivity extremely high when children are involved"
  - "Question of whether L4 vehicles should operate in active school zones"
regulatory_action: |
  Santa Monica city council initiated review of robotaxi operations near schools.
  NHTSA opened a preliminary evaluation. California legislators proposed bills
  restricting autonomous vehicle operations in school zones.
