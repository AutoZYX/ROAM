description: |
  Two Waymo robotaxis collided with each other in San Francisco, blocking all
  traffic at the location. After the collision, a third Waymo vehicle approaching
  from behind became stuck, unable to navigate around the two disabled vehicles.
  The result was three Waymo vehicles creating a complete traffic blockage.
  The incident raised questions about fleet-level coordination — whether vehicles
  from the same fleet should have shared awareness to prevent same-fleet collisions
  and cascading blockages. The incident went viral on social media as a symbol of
  robotaxi operational challenges.
