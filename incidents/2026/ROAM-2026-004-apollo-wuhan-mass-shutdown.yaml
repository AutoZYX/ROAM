id: "ROAM-2026-004"
date: "2026-03-31"
time: "17:30"
operator: "Baidu Apollo (萝卜快跑)"
location:
  city: "Wuhan, China"
  road_type: "elevated highway / bridge"
  specific: "杨泗港大桥 (Yangsiggang Bridge), 白沙洲大桥 (Baishazhou Bridge), 三环线 (Third Ring Road)"
scenario:
  primary: "A1"
  secondary: ["C1", "F1"]
severity: "S3"
urgency: "U1"
description: |
  Approximately 100 萝卜快跑 (Luobo Kuaipao) robotaxis simultaneously shut down
  across Wuhan during evening rush hour. Vehicles stopped on elevated highways
  and major bridges including 杨泗港大桥, 白沙洲大桥, and 三环线 elevated sections.
  Passengers were trapped inside vehicles for up to 2 hours. The in-vehicle SOS
  system was non-functional. Customer service lines were completely overloaded
  and unreachable. Police had to rescue vehicles and extract passengers one by one.
  The mass shutdown paralyzed major traffic arteries in Wuhan during peak hours.
  This incident represents the largest single robotaxi fleet failure event globally,
  surpassing the Waymo SF blackout (ROAM-2025-003) in both scale and severity
  due to passengers being physically trapped on elevated structures with no
  functioning emergency systems.
impact:
  vehicles_affected: 100
  duration_minutes: 120
  traffic_disruption: "critical"
  injuries: 0
  fatalities: 0
emergency_response:
  sos_button: "non-functional"
  customer_service: "completely overloaded, unreachable"
  remote_intervention: "failed / unavailable"
  on_site_response: "police rescue, vehicle-by-vehicle extraction"
  resolution_method: "police physically accessed each vehicle to release passengers and clear vehicles from bridges and elevated roads one by one"
root_cause:
  category: "cloud/network system failure"
  description: "Mass simultaneous shutdown suggests cloud platform or network connectivity failure affecting the entire fleet; all remote systems including SOS, customer service, and remote intervention failed simultaneously, indicating a common-mode failure in the backend infrastructure"
  confirmed: false
systemic_issues:
  - "~100 vehicles simultaneously failing indicates catastrophic single-point-of-failure in cloud infrastructure"
  - "SOS system non-functional during mass failure — the moment it was most needed"
  - "Customer service completely collapsed under load"
  - "Passengers trapped on elevated bridges with no exit path — uniquely dangerous"
  - "No graceful degradation: vehicles stopped in-lane on bridges rather than reaching safe harbors"
  - "Police one-by-one rescue is not scalable — what if fleet grows 10x?"
  - "Largest robotaxi fleet failure globally in terms of vehicles affected"
  - "Evening rush hour on bridges maximized public impact and danger"
regulatory_action: |
  Wuhan city government initiated emergency review of 萝卜快跑 operations.
  Ministry of Industry and Information Technology (MIIT) reportedly requested
  incident report from Baidu. National-level discussion on robotaxi fleet
  resilience standards intensified.
