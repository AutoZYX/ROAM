emergency_response:
  sos_button: "varied"
  customer_service: "slow response relative to emergency timelines"
  remote_intervention: "latency too high for emergency contexts"
  on_site_response: "first responders forced to intervene directly with vehicles"
  resolution_method: "first responders manually moved or overrode vehicles"
root_cause:
  category: "emergency vehicle interaction — systemic pattern"
  description: "Recurring failure to detect, yield to, and clear path for emergency vehicles across multiple scenarios and cities; the pattern indicates a fundamental gap in emergency response behavior rather than isolated bugs"
  confirmed: true
systemic_issues:
  - "At least 6 documented incidents across multiple cities indicate systemic failure"
  - "Emergency vehicle detection and response is a safety-critical function"
  - "First responders lack standardized tools to quickly clear autonomous vehicles"
  - "Remote intervention latency is structurally incompatible with emergency timelines"
  - "No standardized interface between ADS fleets and emergency dispatch systems"
  - "Each incident potentially delays life-saving emergency response"
regulatory_action: |
  NHTSA opened investigation into Waymo emergency vehicle interaction.
  International Association of Fire Chiefs (IAFC) issued guidance on
  autonomous vehicle interaction. Multiple cities considering mandatory
  emergency responder override requirements.
