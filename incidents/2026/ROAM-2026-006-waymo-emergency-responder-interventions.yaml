id: "ROAM-2026-006"
date: "2026-03-01"
operator: "Waymo"
location:
  city: "Multiple US cities"
  road_type: "various"
  specific: "San Francisco, Phoenix, Los Angeles, Austin — various emergency scenes"
scenario:
  primary: "E3"
  secondary: ["C1"]
severity: "S2"
urgency: "U2"
description: |
  Throughout 2026, at least 6 documented instances occurred where first responders
  had to physically take control of Waymo vehicles during emergency operations.
  These incidents span multiple cities in Waymo's operating territory. In each case,
  the autonomous vehicle either failed to yield to emergency vehicles, blocked
  emergency access routes, or froze in positions that obstructed emergency operations.
  Fire departments and police in multiple jurisdictions have reported frustration
  with the inability to quickly clear autonomous vehicles from emergency scenes.
  The pattern indicates a systemic gap in ADS emergency vehicle interaction rather
  than isolated incidents.
impact:
