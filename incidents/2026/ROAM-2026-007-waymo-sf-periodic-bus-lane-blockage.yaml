description: |
  Recurring incidents of Waymo robotaxis stalling in bus lanes and intersections
  across San Francisco throughout 2026. These are not single events but a persistent
  pattern where vehicles enter a frozen or confused state, blocking dedicated bus
  lanes and intersection approaches. Average resolution time is approximately
  20 minutes per incident. SFMTA has documented multiple instances where stalled
  robotaxis delayed Muni bus service. The cumulative impact on public transit
  reliability is significant, affecting thousands of daily bus riders.
  The recurring nature of the problem suggests a systemic issue with the
  vehicle's handling of bus lane geometry, signaling, or right-of-way rules
  rather than random failures.
impact:
  vehicles_affected: 1
  duration_minutes: 20
  traffic_disruption: "moderate (recurring)"
  injuries: 0
  fatalities: 0
emergency_response:
  sos_button: "not typically activated"
  customer_service: "contacted per incident"
  remote_intervention: "attempted, often unsuccessful"
  on_site_response: "Waymo field team or SFMTA"
  resolution_method: "manual vehicle restart or towing; average 20 minutes per incident"
root_cause:
  category: "bus lane / intersection planning failure — recurring"
  description: "Vehicles repeatedly enter frozen states in bus lanes and intersections; likely related to complex right-of-way rules, bus lane markings, or transit signal priority systems that the planning module cannot reliably handle"
  confirmed: false
systemic_issues:
