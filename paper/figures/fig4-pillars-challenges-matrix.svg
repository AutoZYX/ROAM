    <text x="100" y="887" font-size="13" fill="#6B7280" font-style="italic">Operations &amp; Human Factors</text>
    <text x="100" y="912" font-size="13" fill="#374151">操作员认证 · 工作负荷</text>
    <text x="100" y="932" font-size="13" fill="#374151">跨时区协同 · 应急组织</text>

    <rect x="460" y="830" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="545" cy="890" r="22" fill="#DC2626"/>
    <text x="545" y="898" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">●</text>

    <rect x="630" y="830" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="800" y="830" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="885" cy="890" r="22" fill="#DC2626"/>
    <text x="885" y="898" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">●</text>

    <rect x="970" y="830" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="1140" y="830" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="1225" cy="890" r="22" fill="#DC2626"/>
    <text x="1225" y="898" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">●</text>

    <rect x="1310" y="830" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  </g>

  <!-- ================ Legend ================ -->
  <g>
    <rect x="100" y="980" width="1400" height="80" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>

    <text x="120" y="1010" font-size="15" font-weight="700" fill="#1F2937">归因关系：</text>

    <circle cx="240" cy="1005" r="13" fill="#DC2626"/>
    <text x="263" y="1010" font-size="14" fill="#374151">主要归因（核心成因）</text>

    <circle cx="450" cy="1005" r="13" fill="#F59E0B"/>
    <text x="473" y="1010" font-size="14" fill="#374151">次要归因（协同成因）</text>

    <text x="120" y="1042" font-size="13" fill="#6B7280" font-style="italic">
      关键观察：六项挑战中绝大多数同时跨越多个技术支柱，说明单支柱视角不足以应对，需要参考架构进行整合。
    </text>
  </g>

  <!-- Data source -->
  <text x="1500" y="1080" text-anchor="end" font-size="13" fill="#9CA3AF" font-style="italic">
    来源：本文第 6 章六大挑战分析
  </text>
