    <rect x="460" y="710" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="630" y="710" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="800" y="710" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="970" y="710" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="1140" y="710" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="1225" cy="770" r="22" fill="#F59E0B"/>
    <text x="1225" y="777" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">◐</text>

    <rect x="1310" y="710" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
