    <text x="100" y="552" font-size="13" fill="#374151">5G URLLC · 网络切片</text>
    <text x="100" y="572" font-size="13" fill="#374151">C-V2X · LEO 卫星备份</text>

    <rect x="460" y="470" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

