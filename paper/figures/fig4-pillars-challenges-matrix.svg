    <text x="100" y="332" font-size="13" fill="#374151">ODD 监控 · SOTIF 触发条件</text>

    <!-- Cells C1-C6 for P1 -->
    <rect x="460" y="230" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="545" cy="290" r="22" fill="#DC2626"/>
    <text x="545" y="298" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">●</text>

    <rect x="630" y="230" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="800" y="230" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="970" y="230" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="1140" y="230" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="1310" y="230" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="1395" cy="290" r="22" fill="#DC2626"/>
    <text x="1395" y="298" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">●</text>
