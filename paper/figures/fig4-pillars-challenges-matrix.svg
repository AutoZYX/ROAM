    <text x="100" y="432" font-size="13" fill="#374151">低延迟驾驶 · waypoint 规划</text>
    <text x="100" y="452" font-size="13" fill="#374151">情境感知 · HMI 设计</text>

    <rect x="460" y="350" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

