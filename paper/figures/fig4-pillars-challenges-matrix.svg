    <rect x="1140" y="590" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

    <rect x="1310" y="590" width="170" height="120" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
