<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <!-- ================ Background ================ -->
  <rect width="1600" height="1100" fill="#FAFBFC"/>

  <!-- ================ Title ================ -->
  <text x="800" y="52" text-anchor="middle" font-size="32" font-weight="700" fill="#1F2937">
    图 4　六大技术支柱与六大关键挑战归因矩阵
  </text>
  <text x="800" y="82" text-anchor="middle" font-size="17" fill="#6B7280" font-style="italic">
    Six Technology Pillars × Six Key Challenges Attribution Matrix
  </text>

  <!-- ================ Top-left corner empty cell ================ -->
  <rect x="80" y="130" width="380" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="270" y="170" text-anchor="middle" font-size="14" fill="#9CA3AF" font-style="italic">
    技术支柱 ↓　　挑战 →
  </text>
  <text x="270" y="195" text-anchor="middle" font-size="13" fill="#9CA3AF" font-style="italic">
    Pillars ↓　　Challenges →
  </text>

  <!-- ================ Six challenge column headers ================ -->
  <g>
    <!-- C1: 系统性故障 -->
    <rect x="460" y="130" width="170" height="100" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="545" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#991B1B">挑战 1</text>
    <text x="545" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">系统性故障</text>
    <text x="545" y="207" text-anchor="middle" font-size="13" fill="#1F2937">应急能力缺失</text>

    <!-- C2: 概念分歧 -->
    <rect x="630" y="130" width="170" height="100" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="715" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">挑战 2</text>
    <text x="715" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">远程协助/驾驶</text>
    <text x="715" y="207" text-anchor="middle" font-size="13" fill="#1F2937">概念分歧</text>

    <!-- C3: 人车比 -->
    <rect x="800" y="130" width="170" height="100" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="885" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">挑战 3</text>
    <text x="885" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">人车比经济性</text>
    <text x="885" y="207" text-anchor="middle" font-size="13" fill="#1F2937">数量级差距</text>

    <!-- C4: 通信延迟 -->
    <rect x="970" y="130" width="170" height="100" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="1055" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#991B1B">挑战 4</text>
    <text x="1055" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">通信延迟与</text>
    <text x="1055" y="207" text-anchor="middle" font-size="13" fill="#1F2937">跨境运营</text>

