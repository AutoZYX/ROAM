<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif">
  <!-- ================ Background ================ -->
  <rect width="1600" height="1000" fill="#FAFBFC"/>

  <!-- ================ Title ================ -->
  <text x="800" y="52" text-anchor="middle" font-size="32" font-weight="700" fill="#1F2937">
    图 5　ROAM 开源治理框架总体架构
  </text>
  <text x="800" y="82" text-anchor="middle" font-size="17" fill="#6B7280" font-style="italic">
    ROAM Open-Source Governance Framework Architecture
  </text>

  <!-- ================ Top: Input layer ================ -->
  <g transform="translate(0, 120)">
    <rect x="380" y="0" width="840" height="78" rx="8" fill="#FFFFFF" stroke="#6B7280" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="800" y="33" text-anchor="middle" font-size="20" font-weight="700" fill="#374151">
      输入层：L4 运营异常事件
    </text>
    <text x="800" y="60" text-anchor="middle" font-size="14" fill="#6B7280">
      Input: Operational Anomalies from Robotaxi / OEM / Delivery / Transit
    </text>
  </g>

  <!-- Arrow down from input to center -->
  <g>
    <line x1="800" y1="208" x2="800" y2="253" stroke="#374151" stroke-width="2.5"/>
    <polygon points="800,263 793,251 807,251" fill="#374151"/>
  </g>

  <!-- ================ Center: ROAM core ================ -->
  <g>
    <rect x="320" y="270" width="960" height="110" rx="12" fill="#1E3A8A"/>
    <text x="800" y="310" text-anchor="middle" font-size="28" font-weight="700" fill="#FFFFFF">
      ROAM 开源治理框架
    </text>
    <text x="800" y="338" text-anchor="middle" font-size="16" fill="#BFDBFE">
      Remote Operations &amp; Anomaly Management · Apache 2.0 License
    </text>
    <text x="800" y="361" text-anchor="middle" font-size="14" fill="#BFDBFE" font-style="italic">
      github.com/AutoZYX/ROAM
    </text>
  </g>

  <!-- Four connection lines from core to modules -->
  <g stroke="#1E3A8A" stroke-width="2" fill="none">
    <path d="M 540 380 L 250 440" />
    <path d="M 680 380 L 600 440" />
    <path d="M 920 380 L 1000 440" />
    <path d="M 1060 380 L 1350 440" />
  </g>

  <!-- ================ Four modules ================ -->
  <!-- Module 1: Incident Database -->
  <g>
    <rect x="100" y="440" width="300" height="240" rx="10" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2.5"/>
    <rect x="100" y="440" width="300" height="54" rx="10" fill="#1E40AF"/>
    <rect x="100" y="484" width="300" height="10" fill="#1E40AF"/>
    <text x="250" y="476" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">模块 1　事件数据库</text>
    <text x="250" y="520" text-anchor="middle" font-size="15" font-weight="600" fill="#1E40AF">Incident Database</text>

    <text x="120" y="552" font-size="16" fill="#374151">• YAML 结构化记录</text>
    <text x="120" y="578" font-size="16" fill="#374151">• 16+ 事件案例</text>
    <text x="120" y="604" font-size="16" fill="#374151">• 社区维护，持续更新</text>
    <text x="120" y="630" font-size="16" fill="#374151">• 覆盖 4 家主要运营商</text>

    <line x1="120" y1="645" x2="380" y2="645" stroke="#E5E7EB" stroke-width="1"/>
    <text x="250" y="666" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">
      对接 GB 草案附录 D 安全档案
    </text>
  </g>

  <!-- Module 2: Scenario Taxonomy -->
  <g>
    <rect x="450" y="440" width="300" height="240" rx="10" fill="#FFFFFF" stroke="#047857" stroke-width="2.5"/>
    <rect x="450" y="440" width="300" height="54" rx="10" fill="#047857"/>
    <rect x="450" y="484" width="300" height="10" fill="#047857"/>
    <text x="600" y="476" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">模块 2　场景分类</text>
    <text x="600" y="520" text-anchor="middle" font-size="15" font-weight="600" fill="#047857">Scenario Taxonomy</text>

    <text x="470" y="552" font-size="16" fill="#374151">• 6 大类 27 子场景</text>
    <text x="470" y="578" font-size="16" fill="#374151">• 严重度 S0—S4</text>
    <text x="470" y="604" font-size="16" fill="#374151">• 紧急度 U0—U3</text>
    <text x="470" y="630" font-size="16" fill="#374151">• MECE 互斥穷尽</text>

    <line x1="470" y1="645" x2="730" y2="645" stroke="#E5E7EB" stroke-width="1"/>
    <text x="600" y="666" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">
      兼容 ISO 34502 场景分层
    </text>
  </g>

  <!-- Module 3: Reference Architecture -->
  <g>
    <rect x="800" y="440" width="300" height="240" rx="10" fill="#FFFFFF" stroke="#C2410C" stroke-width="2.5"/>
    <rect x="800" y="440" width="300" height="54" rx="10" fill="#C2410C"/>
    <rect x="800" y="484" width="300" height="10" fill="#C2410C"/>
    <text x="950" y="476" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">模块 3　参考架构</text>
    <text x="950" y="520" text-anchor="middle" font-size="15" font-weight="600" fill="#C2410C">Reference Architecture</text>

    <text x="820" y="552" font-size="16" fill="#374151">• L1 AI 自主响应（~70%）</text>
    <text x="820" y="578" font-size="16" fill="#374151">• L2 AI 辅助 + 人工（~25%）</text>
    <text x="820" y="604" font-size="16" fill="#374151">• L3 远程驾驶 + 派人（~5%）</text>
    <text x="820" y="630" font-size="16" fill="#374151">• 10 模式 × 3 层 责任矩阵</text>

    <line x1="820" y1="645" x2="1080" y2="645" stroke="#E5E7EB" stroke-width="1"/>
    <text x="950" y="666" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">
      对齐 SAE J3016 与 GB 附录 C.2
    </text>
  </g>

  <!-- Module 4: Evaluation Benchmarks -->
  <g>
    <rect x="1150" y="440" width="300" height="240" rx="10" fill="#FFFFFF" stroke="#6D28D9" stroke-width="2.5"/>
    <rect x="1150" y="440" width="300" height="54" rx="10" fill="#6D28D9"/>
    <rect x="1150" y="484" width="300" height="10" fill="#6D28D9"/>
    <text x="1300" y="476" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">模块 4　评价基准</text>
    <text x="1300" y="520" text-anchor="middle" font-size="15" font-weight="600" fill="#6D28D9">Evaluation Benchmarks</text>

    <text x="1170" y="552" font-size="16" fill="#374151">• 8 项核心 KPI</text>
    <text x="1170" y="578" font-size="16" fill="#374151">• MTTR / AI 自主率</text>
    <text x="1170" y="604" font-size="16" fill="#374151">• 误升级率 / 漏升级率</text>
    <text x="1170" y="630" font-size="16" fill="#374151">• 模式差异化目标</text>

    <line x1="1170" y1="645" x2="1430" y2="645" stroke="#E5E7EB" stroke-width="1"/>
    <text x="1300" y="666" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7280">
      对接 3GPP TS 22.186 延迟基准
    </text>
  </g>

  <!-- Arrows from modules to output layer -->
  <g stroke="#374151" stroke-width="2" fill="none">
    <path d="M 250 680 L 250 738" />
    <path d="M 600 680 L 600 738" />
    <path d="M 950 680 L 950 738" />
    <path d="M 1300 680 L 1300 738" />
  </g>
  <g fill="#374151">
    <polygon points="250,748 243,736 257,736" />
    <polygon points="600,748 593,736 607,736" />
    <polygon points="950,748 943,736 957,736" />
    <polygon points="1300,748 1293,736 1307,736" />
  </g>

  <!-- ================ Output layer ================ -->
  <g>
    <rect x="180" y="755" width="1240" height="100" rx="10" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
    <text x="800" y="788" text-anchor="middle" font-size="20" font-weight="700" fill="#1F2937">
      输出层：跨模式、跨组织、跨监管的治理产出
    </text>
    <text x="800" y="814" text-anchor="middle" font-size="15" fill="#4B5563">
      可比 KPI 基准 · 责任矩阵 · 实证事件库 · 安全档案证据链
    </text>
    <text x="800" y="836" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">
      Outputs: Comparable KPIs · Responsibility Matrix · Evidence Base · Safety Case Support
    </text>
  </g>

  <!-- ================ Design principles (bottom) ================ -->
  <g transform="translate(0, 890)">
    <text x="800" y="0" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">
      四项设计原则
    </text>
    <g font-size="14" fill="#4B5563">
      <text x="220" y="32" text-anchor="middle">证据驱动</text>
      <text x="220" y="52" text-anchor="middle" font-size="12" fill="#9CA3AF">Evidence-Based</text>

      <text x="580" y="32" text-anchor="middle">开放透明</text>
      <text x="580" y="52" text-anchor="middle" font-size="12" fill="#9CA3AF">Open Transparency</text>

      <text x="980" y="32" text-anchor="middle">AI 优先 · 人工分级兜底</text>
      <text x="980" y="52" text-anchor="middle" font-size="12" fill="#9CA3AF">AI-First, Human-on-Exception</text>

      <text x="1380" y="32" text-anchor="middle">跨域知识迁移</text>
      <text x="1380" y="52" text-anchor="middle" font-size="12" fill="#9CA3AF">Cross-Domain Knowledge Transfer</text>
    </g>
  </g>
</svg>
