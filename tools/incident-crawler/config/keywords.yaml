# ROAM Incident Keyword Configuration
# Used for filtering news articles and identifying relevant incidents

languages:
  en:
    operator_names:
      - Waymo
      - Cruise
      - Baidu Apollo
      - Apollo Go
      - Pony.ai
      - WeRide
      - Tesla Robotaxi
      - Vay
      - Zoox
      - Motional

    incident_types:
      - robotaxi incident
      - autonomous vehicle crash
      - self-driving accident
      - robotaxi stuck
      - robotaxi blocking traffic
      - autonomous vehicle fire
      - pedestrian collision
      - fleet paralysis
      - robotaxi shutdown
      - remote operator failure
      - teleoperation failure
      - robotaxi recall

    outcome_keywords:
      - crash
      - collision
      - injury
      - fatality
      - stranded
      - blocked
      - stuck
      - fire
      - malfunction
      - shutdown

    remote_ops_keywords:
      - remote operator
      - remote assistance
      - teleoperation
      - fleet response
      - remote driving
      - takeover

  zh:
    operator_names:
      - 萝卜快跑
      - 百度Apollo
      - 小马智行
      - Pony.ai
      - 文远知行
      - WeRide
      - 特斯拉Robotaxi
      - Cruise
      - Waymo

    incident_types:
      - 无人出租车 事故
      - 无人驾驶出租车 事故
      - 自动驾驶 事故
      - Robotaxi 事故
      - 无人车 故障
      - 无人车 瘫痪
      - 车队瘫痪
      - 无人驾驶 停车
      - 远程接管 失败
      - 萝卜快跑 瘫痪
      - 萝卜快跑 事故
      - 自动驾驶 起火

    outcome_keywords:
      - 事故
      - 碰撞
      - 撞击
      - 伤亡
      - 受伤
      - 死亡
      - 被困
      - 堵塞
      - 瘫痪
      - 起火
      - 故障
      - 停运

    remote_ops_keywords:
      - 远程接管
      - 远程协助
      - 远程操作员
      - 远程驾驶
      - 远程运营

# Keyword combination rules
# A news article is considered "candidate incident" if it matches:
#   (operator_name OR generic robotaxi term) AND (incident_type OR outcome_keyword)
combination_rules:
  must_match_one_of:
    - operator_names
    - incident_types
  and_must_match_one_of:
    - outcome_keywords
    - incident_types

# Exclusion keywords (reject articles that are pure announcements/marketing)
exclusion_keywords:
  en:
    - announces
    - raises funding
    - IPO
    - partnership announcement
    - launches service
    - expands to
  zh:
    - 宣布
    - 融资
    - 上市
    - 合作发布
    - 启动运营
    - 扩展至

# Geographic filters (limit to cities with known robotaxi operations)
geographic_filters:
  en:
    - San Francisco
    - Phoenix
    - Austin
    - Los Angeles
    - Las Vegas
    - Berlin
    - Munich
  zh:
    - 北京
    - 上海
    - 深圳
    - 广州
    - 武汉
    - 重庆
    - 长沙
    - 杭州
