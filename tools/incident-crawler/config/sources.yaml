# ROAM Incident Data Sources Configuration
# Tiered by data quality: S (official) > A (established media) > B (community)

sources:
  # ===== S-TIER: Official Incident Databases =====
  - source_id: nhtsa_sgo
    name: "NHTSA Standing General Order Database"
    url: "https://www.nhtsa.gov/laws-regulations/standing-general-order-crash-reporting"
    data_url: "https://www.nhtsa.gov/sites/nhtsa.gov/files/"
    type: HTML
    priority: S
    language: en
    update_frequency: weekly
    keywords_filter: [ADS, L4, robotaxi, autonomous]
    notes: "Manufacturer-reported ADS incidents; structured data"

  - source_id: oecd_ai_incidents
    name: "OECD.AI Incidents Database"
    url: "https://oecd.ai/en/incidents"
    type: RSS
    rss_url: "https://oecd.ai/en/incidents-feed.xml"
    priority: S
    language: en
    update_frequency: weekly
    keywords_filter: [robotaxi, autonomous vehicle, self-driving]
    notes: "Curated international AI incidents"

  # ===== A-TIER: Established News (English) =====
  - source_id: techcrunch
    name: "TechCrunch - Transportation"
    url: "https://techcrunch.com/category/transportation/"
    type: RSS
    rss_url: "https://techcrunch.com/category/transportation/feed/"
    priority: A
    language: en
    update_frequency: daily
    keywords_filter: [waymo, cruise, baidu, apollo, pony.ai, robotaxi, teleoperation]

  - source_id: cnbc_autos
    name: "CNBC Autos"
    url: "https://www.cnbc.com/autos/"
    type: RSS
    rss_url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10000664"
    priority: A
    language: en
    update_frequency: daily
    keywords_filter: [robotaxi, autonomous, waymo, tesla robotaxi]

  - source_id: reuters_autos
    name: "Reuters Autos"
    url: "https://www.reuters.com/business/autos-transportation/"
    type: HTML
    priority: A
    language: en
    update_frequency: daily
    keywords_filter: [robotaxi, autonomous vehicle, self-driving]

  - source_id: nbc_news
    name: "NBC News"
    url: "https://www.nbcnews.com"
    type: HTML
    priority: A
    language: en
    update_frequency: daily
    keywords_filter: [robotaxi, self-driving]

  - source_id: sf_standard
    name: "SF Standard"
    url: "https://sfstandard.com"
    type: HTML
    priority: A
    language: en
    update_frequency: daily
    keywords_filter: [waymo, cruise, robotaxi, San Francisco]

  - source_id: autoblog
    name: "Autoblog"
    url: "https://www.autoblog.com"
    type: RSS
    rss_url: "https://www.autoblog.com/rss.xml"
    priority: A
    language: en
    update_frequency: daily
    keywords_filter: [waymo, robotaxi, self-driving, cruise]

  - source_id: futurism
    name: "Futurism - Advanced Transport"
    url: "https://futurism.com/advanced-transport"
    type: HTML
    priority: A
    language: en
    update_frequency: daily
    keywords_filter: [waymo, tesla, robotaxi, self-driving]

  # ===== A-TIER: Established News (Chinese) =====
  - source_id: huxiu
    name: "虎嗅网"
    url: "https://www.huxiu.com"
    type: HTML
    priority: A
    language: zh
    update_frequency: daily
    keywords_filter: [萝卜快跑, 无人驾驶, 小马智行, 文远知行, 自动驾驶]

  - source_id: 36kr
    name: "36氪"
    url: "https://36kr.com"
    type: HTML
    priority: A
    language: zh
    update_frequency: daily
    keywords_filter: [Robotaxi, 萝卜快跑, 无人出租车, 自动驾驶]

  - source_id: gmw
    name: "光明网"
    url: "https://www.gmw.cn"
    type: HTML
    priority: A
    language: zh
    update_frequency: daily
    keywords_filter: [萝卜快跑, 无人驾驶出租车, 自动驾驶事故]

  - source_id: sina_auto
    name: "新浪汽车"
    url: "https://auto.sina.com.cn"
    type: RSS
    rss_url: "https://rss.sina.com.cn/news/auto/news.xml"
    priority: A
    language: zh
    update_frequency: daily
    keywords_filter: [萝卜快跑, 无人出租车, 自动驾驶, 远程接管]

  - source_id: thepaper
    name: "澎湃新闻"
    url: "https://www.thepaper.cn"
    type: HTML
    priority: A
    language: zh
    update_frequency: daily
    keywords_filter: [萝卜快跑, 无人驾驶, 自动驾驶]

  # ===== B-TIER: Community Sources =====
  - source_id: reddit_sdc
    name: "Reddit r/SelfDrivingCars"
    url: "https://www.reddit.com/r/SelfDrivingCars/"
    type: API
    api_url: "https://www.reddit.com/r/SelfDrivingCars/new.json"
    priority: B
    language: en
    update_frequency: daily
    keywords_filter: [crash, incident, stuck, blocked, accident]

  - source_id: twitter_keywords
    name: "Twitter/X Keyword Monitor"
    url: "https://api.twitter.com/2/tweets/search/recent"
    type: API
    priority: B
    language: multi
    update_frequency: hourly
    keywords_filter: [waymo stuck, robotaxi accident, 萝卜快跑 事故]
    requires_auth: true
